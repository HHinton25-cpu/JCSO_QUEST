<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Choose Game Mode | JCSO Quest</title>
  <meta name="description" content="Choose a JCSO Quest game mode before setting up a host game." />
  <link rel="icon" href="favicon.ico?v=20260630-power-battle-light-v3" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=20260630-power-battle-light-v3" />
  <meta name="theme-color" content="#062B72" />
  <link rel="stylesheet" href="styles.css?v=20260630-power-battle-light-v3" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="center-shell mode-select-shell">
    <section class="hero-card mode-select-hero">
      <div class="mode-select-header">
        <img class="mode-select-logo" src="jcso-quest-wordmark-header-md.png?v=20260630-power-battle-light-v3" alt="JCSO Quest" />
        <div>
          <p class="eyebrow">Host setup</p>
          <h1>Choose a Game Mode</h1>
          <p class="lead compact-lead">Pick how players will compete, then choose the question bank and game options.</p>
        </div>
      </div>
      <div id="mode-card-grid" class="mode-card-grid"></div>
      <div class="mode-page-footer">
        <a class="ghost-btn" href="index.html">Back Home</a>
        <a class="ghost-btn" href="play.html">Join Instead</a>
      </div>
    </section>
  </main>
  <script src="common.js?v=20260630-power-battle-light-v3"></script>
  <script>
    (() => {
      const LQ = window.LiveQuiz;
      const grid = document.getElementById('mode-card-grid');
      if (!grid || !LQ) return;
      const details = {
        classic: ['Host-paced', 'Timed questions', 'Speed points'],
        'coin-rush': ['Self-paced', '3 mystery chests', 'Gold goal or timer'],
        'cadet-race': ['Self-paced', 'Route rewards', 'Race to the finish'],
        'power-battle': ['Power Battle', 'Simultaneous matchups', '5-life system']
      };
      grid.innerHTML = LQ.gameModes.map(mode => {
        const bullets = (details[mode.id] || []).map(item => `<span>${LQ.escapeHtml(item)}</span>`).join('');
        const gameLabel = mode.id === 'classic' ? 'Classic quiz' : mode.id === 'power-battle' ? 'Power Battle' : 'Self-paced game';
        return `
          <a class="mode-select-card mode-${LQ.escapeAttr(mode.id)}" href="host.html?mode=${encodeURIComponent(mode.id)}" aria-label="Host ${LQ.escapeAttr(mode.name)}">
            <img src="${LQ.escapeAttr(mode.image || '')}?v=20260630-power-battle-light-v3" alt="" loading="lazy" decoding="async" />
            <div class="mode-select-card-body">
              <p class="eyebrow">${gameLabel}</p>
              <h2 class="mode-card-title-logo">${LQ.modeLogoMarkup(mode, 'mode-logo-chip mode-logo-inline')} <span>${LQ.escapeHtml(mode.name)}</span></h2>
              <p>${LQ.escapeHtml(mode.objective)}</p>
              <div class="mode-card-tags">${bullets}</div>
            </div>
          </a>
        `;
      }).join('');
    })();
  </script>
</body>
</html>
